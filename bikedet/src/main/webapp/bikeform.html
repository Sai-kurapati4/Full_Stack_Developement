<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Bike Details</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        background: #ffffff;
        padding: 30px 40px;
        width: 350px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    label {
        font-weight: bold;
        color: #555;
        display: block;
        margin-bottom: 6px;
    }

    input[type="text"],
    input[type="number"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 18px;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 14px;
        outline: none;
        transition: border 0.3s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
        border-color: #4facfe;
    }

    input[type="submit"] {
        width: 100%;
        padding: 12px;
        background: #4facfe;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.3s;
    }

    input[type="submit"]:hover {
        background: #3282f6;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Bike Details</h2>

    <form action="register" method="post">
        <label>Name</label>
        <input type="text" name="name" required>

        <label>CC</label>
        <input type="number" name="cc" required>

        <label>Company</label>
        <input type="text" name="company" required>

        <input type="submit" value="Add">
    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Students</title>
</head>
<body>

<h2>Student List</h2>

<a href="/students/new">Add Student</a>

<table border="1">
<tr>
<th>ID</th>
<th>First Name</th>
<th>Last Name</th>
<th>Email</th>
</tr>

<tr th:each="s : ${students}">
<td th:text="${s.id}"></td>
<td th:text="${s.firstName}"></td>
<td th:text="${s.lastName}"></td>
<td th:text="${s.email}"></td>
</tr>

</table>

</body>
</html>
